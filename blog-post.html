<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Blog — D S Travels</title>
    <meta name="description" id="pageMeta" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0B1D35; --navy-mid: #132D4F; --gold: #C9963B; --gold-light: #E4BE7A; --warm-white: #FAF8F5; --white: #FFFFFF; --text-dark: #1A1A2E; --text-mid: #4A5568; --text-light: #8A94A6; }
        body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text-dark); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        a { text-decoration: none; color: inherit; }

        .nav { background: var(--navy); padding: 16px 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
        .nav .container { max-width: 1000px; }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; color: var(--white); font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
        .logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .nav-links a:hover { color: var(--white); }
        .nav-cta { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy) !important; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 0.85rem; }

        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--gold); font-weight: 600; font-size: 0.9rem; margin: 32px 0 24px; }
        .back-link:hover { gap: 10px; }

        .post-header { margin-bottom: 32px; }
        .post-header h1 { font-size: 2.2rem; color: var(--navy); margin-bottom: 12px; line-height: 1.2; }
        .post-header .meta { font-size: 0.9rem; color: var(--text-light); }

        .post-content { background: var(--white); border-radius: 16px; padding: 40px; border: 1px solid rgba(0,0,0,0.04); margin-bottom: 60px; line-height: 1.85; font-size: 1.05rem; color: var(--text-mid); }
        .post-content h2 { font-size: 1.4rem; color: var(--navy); margin: 28px 0 12px; }
        .post-content h3 { font-size: 1.2rem; color: var(--navy); margin: 24px 0 10px; }
        .post-content p { margin-bottom: 16px; }
        .post-content ul, .post-content ol { margin: 0 0 16px 24px; }
        .post-content li { margin-bottom: 8px; }
        .post-content a { color: var(--gold); text-decoration: underline; }
        .post-content blockquote { border-left: 4px solid var(--gold); padding: 16px 24px; margin: 20px 0; background: rgba(201,150,59,0.05); border-radius: 0 8px 8px 0; font-style: italic; }

        .cta-box { background: var(--navy); border-radius: 16px; padding: 36px; text-align: center; margin-bottom: 60px; }
        .cta-box h3 { color: var(--white); font-size: 1.3rem; margin-bottom: 12px; }
        .cta-box p { color: rgba(255,255,255,0.6); margin-bottom: 20px; }
        .cta-box a { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); padding: 14px 32px; border-radius: 50px; font-weight: 700; }

        .footer { background: var(--navy); padding: 32px 0; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container" style="max-width:1000px;">
            <div class="nav-inner">
                <a href="/" class="logo">D S <span>Travels</span></a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/blog.html">Blog</a>
                    <a href="https://wa.me/919049390189" class="nav-cta" target="_blank">WhatsApp Us</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="blog.html" class="back-link">← Back to Blog</a>
        <div id="postContainer">
            <div class="post-header">
                <h1 id="postTitle">Loading...</h1>
                <div class="meta" id="postMeta"></div>
            </div>
            <div class="post-content" id="postContent"></div>
        </div>
        <div class="cta-box">
            <h3>Ready to Book Your Trip?</h3>
            <p>Get the best fares and lowest cancellation charges with D S Travels.</p>
            <a href="https://wa.me/919049390189?text=Hi%20D%20S%20Travels%2C%20I%27m%20interested%20in%20booking%20a%20trip!" target="_blank">Book on WhatsApp</a>
        </div>
    </div>

    <footer class="footer">
        <div class="container" style="max-width:1000px;">
            <p>&copy; 2026 D S Travels. All rights reserved. | Aundh, Pune</p>
        </div>
    </footer>

    <script>
    (async function() {
        const slug = new URLSearchParams(window.location.search).get('slug');
        if (!slug) { window.location.href = 'blog.html'; return; }

        try {
            const res = await fetch(`api/blog.php?slug=${encodeURIComponent(slug)}`);
            if (!res.ok) { document.getElementById('postTitle').textContent = 'Post Not Found'; return; }
            const post = await res.json();

            document.getElementById('postTitle').textContent = post.title;
            document.getElementById('postMeta').textContent = `${new Date(post.date).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})} · ${post.author||'D S Travels'}`;
            document.getElementById('postContent').innerHTML = post.content;
            document.getElementById('pageTitle').textContent = post.metaTitle || post.title + ' | D S Travels Blog';
            document.getElementById('pageMeta').content = post.metaDescription || post.excerpt || '';
        } catch(e) {
            document.getElementById('postTitle').textContent = 'Error Loading Post';
        }
    })();
    </script>
</body>
</html>
